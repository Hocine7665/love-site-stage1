<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>مرحلة 1 - الواجهة</title>
<style>
  /* خلفية سوداء ونصوص بيضاء */
  body {
    margin: 0;
    padding: 0;
    background-color: black; 
    font-family: Arial, sans-serif;
    color: white; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* حاوية الصور */
  .container {
    display: flex;
    gap: 20px; /* المسافة بين الصور */
  }

  .item {
    text-align: center;
  }

  .item img {
    width: 150px;
    height: auto;
    border-radius: 10px;
  }

  .item p {
    margin-top: 10px;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="item">
    <img src="images/image1.png" alt="صورة 1">
    <p>حفصة</p>
  </div>
  <div class="item">
    <img src="images/image2.png" alt="صورة 2">
    <p>غيلاس</p>
  </div>
  <div class="item">
    <img src="images/image3.png" alt="صورة 3">
    <p>فراح</p>
  </div>
</div>

</body>
</html>
